name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Build and pack
        run: |
          dotnet restore
          dotnet pack src/NotifyR --no-restore --configuration Release

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push src/NotifyR/bin/Release/*.nupkg \
            --skip-duplicate \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

  deploy-docs:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v7

      - name: Build documentation
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin
          mdbook build docs/

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
